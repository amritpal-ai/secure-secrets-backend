{% extends "layout.html" %}
{% block content %}
<div class="container mt-5 animate-fade">
    <h3 class="text-center fw-bold mb-4">✏️ Edit {{ field.capitalize() }} for <span class="text-primary">{{ site }}</span></h3>

    <form method="POST" class="shadow-sm p-4 bg-light rounded">
        <div class="mb-3">
            <label class="form-label fw-semibold text-dark">New {{ field.capitalize() }}</label>
            <div class="input-group">
                <input type="text" class="form-control" id="new_value" name="new_value" value="{{ generated_value or '' }}" required>
                {% if field == "password" %}
                <a href="{{ url_for('edit_pass', entry_id=entry.id, field=field, gen=1) }}" class="btn btn-outline-warning">🔁 Generate</a>
                {% endif %}
                <button type="button" onclick="copyToClipboard()" class="btn btn-outline-secondary">📋</button>
            </div>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-start">
            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">↩️ Cancel</a>
        </div>
    </form>
</div>

<script>
function copyToClipboard() {
    const text = document.getElementById("newValue").value;
    navigator.clipboard.writeText(text).then(() => {
        alert("Copied to clipboard!");
    });
}
</script>

<style>
.animate-fade {
  animation: fadeIn 0.4s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
{% endblock %}
