{% extends "layout.html" %}
{% block content %}

<div class="row justify-content-center animate-fade mt-5">
  <div class="col-md-6 col-lg-5">

    <div class="text-center mb-4">
      <h2 class="fw-bold">📝 Create Your Account</h2>
      <p style="color: #f1f1f1; font-weight: 500;" class="text-center">
  Just a few steps to start managing your passwords securely.
</p>

    </div>

    <form method="post" class="shadow-sm p-4 rounded bg-white">
      <div class="mb-3">
        <label class="form-label text-dark">📧 Email Address</label>
        <input type="email" class="form-control" name="username" placeholder="you@example.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label text-dark">🔑 Password</label>
        <input type="password" class="form-control" name="password" placeholder="Create a strong password" required>
      </div>

      <div class="mb-3">
        <label class="form-label text-dark">🔁 Confirm Password</label>
        <input type="password" class="form-control" name="cpassword" placeholder="Repeat password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100 transition">Register</button>
    </form>

    <div class="text-center mt-3">
      <span class="text-light">Already have an account?</span>
      <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Login here</a>
    </div>

  </div>
</div>

<style>
  .animate-fade {
    animation: fadeIn 0.5s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .transition {
    transition: all 0.3s ease;
  }

  .transition:hover {
    transform: translateY(-2px);
    opacity: 0.95;
  }

  form {
    background-color: #f9f9f9;
  }
</style>

{% endblock %}
