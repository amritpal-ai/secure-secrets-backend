{% extends "layout.html" %}
{% block content %}

<div class="container mt-5">
  <h2 class="text-center mb-4">🔐 Generated Password</h2>

  {% if password %}
    <div class="d-flex justify-content-center align-items-center mb-3">
      <input type="text" id="generatedPassword" class="form-control w-50 me-2 text-center" value="{{ password }}" readonly>
      <button class="btn btn-outline-primary" onclick="copyToClipboard()">📋 Copy</button>
    </div>
    <div id="copyMsg" class="text-success text-center" style="display: none;">✅ Password copied!</div>

    <form method="post" action="{{ url_for('handle_password_choice') }}">
    <input type="hidden" name="generated_password" value="{{ password }}">

    <button type="submit" class="btn btn-success me-2" name="choice" value="use">✅ Use this</button>
    <button type="submit" class="btn btn-warning me-2" name="choice" value="generate">🔁 Generate another</button>
    <button type="submit" class="btn btn-secondary" name="choice" value="manual">✍️ I'll write my own</button>
</form>

  {% endif %}

</div>

<script>
  function copyToClipboard() {
    const input = document.getElementById("generatedPassword");
    input.select();
    input.setSelectionRange(0, 99999);
    document.execCommand("copy");
    document.getElementById("copyMsg").style.display = "block";
    setTimeout(() => {
      document.getElementById("copyMsg").style.display = "none";
    }, 2000);
  }
</script>

{% endblock %}
