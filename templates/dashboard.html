{% extends "layout.html" %}

{% block content %}

<body autocomplete="off">
</body>
<div class="container mt-5">
    <h2 class="text-center mb-4">Welcome, {{ session['username'] }}!</h2>

    <div class="text-center mb-4">
        <a href="{{ url_for('add_pass') }}" class="btn btn-primary">+ Add Password</a>
        <a href="{{ url_for('logout') }}" class="btn btn-danger ms-2">Logout</a>
    </div>

    <div class="table-responsive">
        <table class="table table-dark table-hover align-middle text-center">
            <thead>
                <tr>
                    <th>Site</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for entry in vault %}
                <tr>
                    <td>{{ entry.site }}</td>

                    <!-- USERNAME -->
                    <td>
                        <input type="password"
                               class="form-control text-center mb-1"
                               value="{{ entry.username }}"
                               readonly>

                        <button type="button" class="btn btn-secondary toggle-visibility">👁️</button>
                        <button type="button" class="btn btn-info copy-btn">📋</button>

                        <a href="{{ url_for('edit_pass', entry_id=entry.id, field='username') }}"
                           class="btn btn-warning mt-1">✏️</a>
                    </td>

                    <!-- PASSWORD -->
                    <td>
                        <input type="password"
                               class="form-control text-center mb-1"
                               value="{{ entry.password }}"
                               readonly>

                        <button type="button" class="btn btn-secondary toggle-visibility">👁️</button>
                        <button type="button" class="btn btn-info copy-btn">📋</button>

                        <a href="{{ url_for('edit_pass', entry_id=entry.id, field='password') }}"
                           class="btn btn-warning mt-1">✏️</a>
                    </td>

                    <!-- DELETE -->
                    <td>
                        <form method="POST"
                              action="{{ url_for('delete_pass', entry_id=entry.id) }}"
                              onsubmit="return confirmDelete(this, '{{ entry.site }}')">

                            <input type="text"
                                   name="confirm_site"
                                   class="form-control mb-1"
                                   placeholder="Type site name to confirm"
                                   required>

                            <button type="submit" class="btn btn-danger">🗑️ Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    // Toggle visibility
    document.querySelectorAll('.toggle-visibility').forEach(btn => {
        btn.addEventListener('click', function () {
            const input = this.previousElementSibling;
            input.type = input.type === 'password' ? 'text' : 'password';
        });
    });

    // Copy to clipboard
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', async function () {
            const input = this.previousElementSibling.previousElementSibling;
            try {
                await navigator.clipboard.writeText(input.value);
                btn.innerText = "✅";
                setTimeout(() => btn.innerText = "📋", 1000);
            } catch (err) {
                alert("Failed to copy");
            }
        });
    });

    function confirmDelete(form, siteName) {
        const input = form.querySelector('input[name="confirm_site"]').value.trim();
        if (input !== siteName) {
            alert("Site name does not match. Please type exactly: " + siteName);
            return false;
        }
        return true;
    }
</script>
{% endblock %}
