{% extends "layout.html" %}
{% block content %}
<div class="container mt-5 animate-fade">
    <h2 class="text-center mb-4 fw-bold text-warning">🔑 Forgot Password</h2>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" class="shadow-sm p-4 bg-light rounded">
        <div class="mb-3">
            <label class="form-label fw-semibold">Enter your registered email</label>
            <input type="email" class="form-control" name="username" placeholder="you@example.com" required>
        </div>

        <button type="submit" class="btn btn-warning w-100 fw-semibold">📨 Send OTP</button>
        <div class="text-center mt-3">
            <span class="text-muted">Remembered your password?</span>
            <a href="{{ url_for('login') }}" class="ms-1">Login</a>
        </div>
    </form>
</div>

<style>
.animate-fade {
    animation: fadeIn 0.4s ease-out;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
{% endblock %}
