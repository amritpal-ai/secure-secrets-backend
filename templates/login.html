{% extends "layout.html" %}
{% block content %}

<div class="row justify-content-center animate-fade mt-5">
  <div class="col-md-6 col-lg-5">

    <div class="text-center mb-4">
      <h2 class="fw-bold">🔐 Login to Your Account</h2>
      <p style="color: #f1f1f1; font-weight: 500;" class="text-center">
  Welcome back! Please enter your credentials.
</p>

    </div>

    <form method="post" class="shadow-sm p-4 rounded bg-white">
      <div class="mb-3">
        <label for="username" class="form-label text-dark">📧 Email Address</label>
        <input type="email" class="form-control" id="username" name="username" placeholder="you@example.com" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label text-dark">🔑 Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="mb-3 d-flex justify-content-between align-items-center">
        <a href="{{ url_for('forgot_pass') }}" class="small text-decoration-none">Forgot Password?</a>
      </div>

      <button type="submit" class="btn btn-primary w-100 shadow-sm transition">Login</button>
    </form>

    <div class="text-center mt-3">
      <span class="text-light">Don’t have an account?</span>
      <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Register</a>
    </div>
    
  </div>
</div>

<style>
  .animate-fade {
    animation: fadeIn 0.5s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .transition {
    transition: all 0.3s ease;
  }

  .transition:hover {
    transform: translateY(-2px);
    opacity: 0.95;
  }

  form {
    background-color: #f9f9f9;
  }
</style>

{% endblock %}
