{% extends "layout.html" %}

{% block content %}
<div class="text-center mt-5 animate-fade">
  <h2 class="fw-bold mb-3">Welcome to the Password Manager 🔐</h2>
  <p style="color: #f1f1f1; font-weight: 500;" class="text-center">
  Just a few steps to start managing your passwords securely.
</p>

  <div class="d-flex justify-content-center flex-wrap gap-3">
    <a href="{{ url_for('register') }}" class="btn btn-lg btn-primary px-4 shadow-sm transition">
      📝 Register
    </a>
    <a href="{{ url_for('login') }}" class="btn btn-lg btn-success px-4 shadow-sm transition">
      🔑 Login
    </a>
  </div>
</div>

<style>
  .animate-fade {
    animation: fadeUp 0.5s ease-in;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .transition {
    transition: all 0.3s ease-in-out;
  }

  .transition:hover {
    transform: translateY(-2px);
    opacity: 0.95;
  }
</style>
{% endblock %}
